{% extends "base.html" %}
{% block public_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-base)">
  <div class="odin-card" style="max-width:400px;width:100%;text-align:center;padding:40px">
    <i class="bi bi-clock-history" style="font-size:52px;color:var(--red);margin-bottom:16px;display:block"></i>
    <h3 style="font-size:20px;font-weight:700;margin-bottom:8px">Link Expired</h3>
    <p style="color:var(--text-muted);font-size:14px">This share link has expired or reached its download limit.</p>
  </div>
</div>
{% endblock %}
