{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block login_content %}
<div class="login-bg">
    <div class="login-card">
        <div class="login-logo">
            <i class="fa-solid fa-shield-halved" style="color:white;"></i>
        </div>
        <div class="login-title mb-20">
            <h1>EDRLite</h1>
            <p>Endpoint Detection & Response</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label">Commander ID</label>
                <input type="text" name="username" class="form-input" placeholder="Enter username" required autofocus autocomplete="off">
            </div>
            
            <div class="form-group mb-20">
                <label class="form-label">Access Key</label>
                <input type="password" name="password" class="form-input" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fa-solid fa-lock-open" style="margin-right: 8px;"></i> Authenticate
            </button>
            
            <div class="login-creds mt-20">
                <i class="fa-solid fa-key" style="margin-right: 5px;"></i> Default: <b>admin</b> / <b>EDRLite@2024</b>
            </div>
        </form>
    </div>
</div>
{% endblock %}
